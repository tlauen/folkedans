<!doctype html>
<html lang="nn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tiptap-editor</title>

  <!-- Same font som resten av nettstaden -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,650&display=swap" rel="stylesheet">

  <!-- Same hovudstil -->
  <link rel="stylesheet" href="stilar/hovud.css" />

  <style>
    main { max-width: 1100px; margin: 0 auto; padding: 1rem; }

    .panel{
      border:1px solid #ddd;
      border-radius:12px;
      padding:1rem;
      background:#fafafa;
      margin-bottom:1rem;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:1rem;
    }
    @media (min-width:900px){
      .grid{ grid-template-columns:1fr 1fr; }
    }

    .rad{ display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; margin:.6rem 0; }
    .rad > label{ min-width: 7rem; }

    .knapp{
      border:1px solid #ccc;
      background:#fff;
      border-radius:10px;
      padding:.4rem .7rem;
      cursor:pointer;
      font:inherit;
    }

    .felt{
      width:100%;
      padding:.55rem .65rem;
      border:1px solid #ccc;
      border-radius:10px;
      font:inherit;
      background:#fff;
      box-sizing: border-box;
    }

    .editor-ramme{
      border:1px solid #ccc;
      border-radius:12px;
      background:#fff;
      padding:.75rem;
      min-height:320px;
    }
    .ProseMirror{ outline:none; min-height:280px; line-height: 1.55; }
    /* Visuell hint for omkved/merknad i editoren */
    .ProseMirror p.omkved{ font-style: italic; opacity: .9; }
    .ProseMirror p.merknad{ border-left: 3px solid #ccc; padding-left: .6rem; margin: .5rem 0; font-size: .95em; color: #555; }
    .ProseMirror p.merknad-inline{ border-left: 3px solid #ccc; padding-left: .6rem; margin-top: -.5rem; margin-bottom: .5rem; font-size: .9em; font-style: italic; color: #555; }

    /* Viktig: ikkje style alle textarea (det gjorde "Om visa" gigantisk).
       Styr berre output-feltet eksplisitt. */
    textarea#html-output{
      width:100%;
      min-height:520px;
      font-family:ui-monospace,monospace;
      border-radius:12px;
      padding:.75rem;
      border:1px solid #ccc;
      background:#fff;
      box-sizing: border-box;
    }

    /* Litt betre for "Om visa"-feltet */
    textarea.felt{
      min-height: 140px;
      font-family: inherit;
    }

    .hint{ opacity:.8; }
    .status{ min-height:1.2em; opacity:.85; }
    code{ font-family: ui-monospace, monospace; }
  </style>
</head>

<body>
  <div id="topp-include"></div>

  <main class="omslag">
    <h1>Tiptap-editor for songar</h1>
    <p class="hint">
      Enter = ny linje · Tom linje = nytt vers · Kursiv/feit blir bevart · Lenker blir elegante knappar med små ikon
    </p>

    <section class="panel" aria-label="Sideinfo og metadata">
      <h2>Sideinfo</h2>
      <div class="rad">
        <label for="side-tittel">Tittel</label>
        <input id="side-tittel" class="felt" type="text" value="Songtittel">
      </div>
      <div class="rad">
        <input id="bilbokvad-ja" type="checkbox" value="1">
        <label for="bilbokvad-ja">Bilbokvad-sida (lenk tilbake til Bilbokvædi nederst)</label>
      </div>
      <div class="rad">
        <input id="versenummer-ja" type="checkbox" value="1">
        <label for="versenummer-ja">Versenummer (nummerering av vers)</label>
      </div>

      <h2>Info i songboks (under Om visa)</h2>
      <div class="rad">
        <label for="meta-tekst">Tekst</label>
        <input id="meta-tekst" class="felt" type="text" placeholder="Tekstforfattar / trad. / innsamlar …">
      </div>
      <div class="rad">
        <label for="meta-melodi">Melodi</label>
        <input id="meta-melodi" class="felt" type="text" placeholder="Komponist / trad. / kjelde …">
      </div>
      <div class="rad">
        <label for="meta-kjelde">Kjelde</label>
        <input id="meta-kjelde" class="felt" type="text" placeholder="Fritt felt. Døme: 'Bratland (1988)' eller ei setning.">
      </div>

      <h2>Lenker (knappar)</h2>
      <div class="rad">
        <label for="lenk-spotify">Spotify</label>
        <input id="lenk-spotify" class="felt" type="url" placeholder="https://open.spotify.com/…">
      </div>
      <div class="rad">
        <label for="lenk-youtube">YouTube</label>
        <input id="lenk-youtube" class="felt" type="url" placeholder="https://youtu.be/… eller https://www.youtube.com/watch?v=…">
      </div>
      <div class="rad">
        <label for="lenk-vimeo">Vimeo</label>
        <input id="lenk-vimeo" class="felt" type="url" placeholder="https://vimeo.com/…">
      </div>
      <div class="rad">
        <label for="lenk-soundcloud">SoundCloud</label>
        <input id="lenk-soundcloud" class="felt" type="url" placeholder="https://soundcloud.com/…">
      </div>
      <div class="rad">
        <label for="lenk-soundscore">SoundScore</label>
        <input id="lenk-soundscore" class="felt" type="url" placeholder="https://… (notar/lyd)">
      </div>

      <h2>Om visa</h2>
      <div class="rad">
        <label for="meta-om-visa">Om visa</label>
        <textarea id="meta-om-visa" class="felt" rows="6"
          placeholder="Kort forklaring, ein setning til eit par avsnitt. Du kan bruke kursiv med <em>…</em> om du vil. Tom linje = nytt avsnitt."></textarea>
      </div>
    </section>

    <div class="grid">
      <!-- Editor -->
      <section class="panel" aria-label="Editor">
        <h2>Editor</h2>

        <div class="rad" id="toolbar" role="toolbar" aria-label="Formatering">
          <button class="knapp" type="button" data-cmd="bold"><strong>Feit</strong></button>
          <button class="knapp" type="button" data-cmd="italic"><em>Kursiv</em></button>
          <button class="knapp" type="button" data-cmd="br">Linjeskift</button>
          <span class="rad" style="margin:0 .5rem 0 0;" aria-label="Blokktype">|</span>
          <button class="knapp" type="button" data-cmd="block-omkved">Omkved</button>
          <button class="knapp" type="button" data-cmd="block-merknad">Merknad</button>
          <button class="knapp" type="button" data-cmd="block-merknad-inline">Merknad-inline</button>
          <button class="knapp" type="button" data-cmd="block-normal">Vers</button>
          <span class="rad" style="margin:0 .5rem 0 0;">|</span>
          <button class="knapp" type="button" data-cmd="clear">Rydd</button>
        </div>

        <div class="editor-ramme" id="editor"></div>

        <div class="rad">
          <button class="knapp" type="button" id="knapp-bygg">Bygg songtekst-side</button>
          <button class="knapp" type="button" id="knapp-tom">Tøm</button>
        </div>

        <div class="status" id="status-venstre" aria-live="polite"></div>
      </section>

      <!-- Output -->
      <section class="panel" aria-label="Output">
        <h2>Full HTML (klar for /song/)</h2>

        <div class="rad">
          <button class="knapp" type="button" id="knapp-kopier">Kopier</button>
        </div>

        <textarea id="html-output" spellcheck="false"></textarea>
        <div class="status" id="status-høgre" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <div id="kolofon-include"></div>

  <script src="skript/inkluder.js"></script>

  <script type="module">
  const out = document.getElementById("html-output");
  const statusV = document.getElementById("status-venstre");
  const statusH = document.getElementById("status-høgre");

  const editorHost = document.getElementById("editor");
  const toolbar = document.getElementById("toolbar");

  function setStatus(el, msg) {
    if (!el) return;
    el.textContent = msg || "";
  }

  async function importFrå(urlar) {
    let sistFeil = null;
    for (const u of urlar) {
      try {
        return await import(u);
      } catch (e) {
        sistFeil = e;
      }
    }
    throw sistFeil || new Error("Ukjend importfeil");
  }

  let editor = null;

  // 1) Last TipTap robust
  try {
    const core = await importFrå([
      "https://cdn.jsdelivr.net/npm/@tiptap/core@2.11.0/+esm",
      "https://esm.sh/@tiptap/core@2.11.0"
    ]);

    const starter = await importFrå([
      "https://cdn.jsdelivr.net/npm/@tiptap/starter-kit@2.11.0/+esm",
      "https://esm.sh/@tiptap/starter-kit@2.11.0"
    ]);

    const paragraphExt = await importFrå([
      "https://cdn.jsdelivr.net/npm/@tiptap/extension-paragraph@2.11.0/+esm",
      "https://esm.sh/@tiptap/extension-paragraph@2.11.0"
    ]);

    const { Editor } = core;
    const StarterKit = starter.default;
    const Paragraph = paragraphExt.default;

    const CustomParagraph = Paragraph.extend({
      addAttributes() {
        return {
          ...this.parent?.() || {},
          blockClass: {
            default: null,
            parseHTML: element => {
              const c = element.getAttribute("class") || "";
              const m = c.match(/(?:^| )(omkved|merknad|merknad-inline)(?: |$)/);
              return m ? m[1] : null;
            },
            renderHTML: attributes => {
              if (!attributes.blockClass) return {};
              return { class: attributes.blockClass };
            }
          }
        };
      }
    });

    editor = new Editor({
      element: editorHost,
      extensions: [
        StarterKit.configure({
          codeBlock: false,
          blockquote: false,
          horizontalRule: false,
          paragraph: false
        }),
        CustomParagraph
      ],
      content: "<p></p>"
    });

    editorHost?.addEventListener("mousedown", () => editor.commands.focus());
    setStatus(statusV, "Editor klar.");
  } catch (e) {
    console.error("Tiptap-init feila:", e);
    setStatus(statusV, "FEIL: Klarte ikkje laste TipTap. Sjå Console (F12) for detaljar.");
    if (editorHost) {
      editorHost.innerHTML =
        `<p style="margin:0; color:#8b0000;">
          Klarte ikkje laste editor-komponentar. Prøv hard reload (Cmd+Shift+R).
        </p>`;
    }
  }

  // 2) Hjelparar
  function esc(s){
    return (s||"")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  function val(id){ return (document.getElementById(id)?.value || "").trim(); }
  function erTom(s){ return !s || !String(s).trim(); }

  function renderInline(nodes){
    let h = "";
    for(const n of nodes || []){
      if(n.type === "text"){
        let t = esc(n.text || "");
        const m = n.marks || [];
        if(m.some(x => x.type === "italic")) t = `<em>${t}</em>`;
        if(m.some(x => x.type === "bold")) t = `<strong>${t}</strong>`;
        h += t;
      } else if(n.type === "hardBreak"){
        h += "<br>";
      }
    }
    return h;
  }

  // Vers: tomt avsnitt = nytt vers. Paragrafar med blockClass (omkved/merknad/merknad-inline) blir eigne <p class="…">.
  function byggVers(doc){
    const vers = [];
    let linjer = [];

    function flush(){
      const rydd = linjer.map(x => (x||"").trim()).filter(Boolean);
      if(rydd.length){
        vers.push(`<p>${rydd.join("<br>")}</p>`);
      }
      linjer = [];
    }

    for(const b of (doc.content || [])){
      if(b.type === "paragraph"){
        const blockClass = b.attrs?.blockClass || null;
        const line = renderInline(b.content || []);
        const tom = !line || line.replace(/<br\s*\/?>/g,"").trim() === "";

        if(blockClass){
          flush();
          if(!tom) vers.push(`<p class="${esc(blockClass)}">${line}</p>`);
        } else if(tom){
          flush();
        } else {
          linjer.push(line);
        }
      } else {
        flush();
      }
    }
    flush();

    return vers.join("\n\n") || "<p></p>";
  }

  function ikonSvg(type){
    const base = `width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false"`;
    if(type === "spotify"){
      return `<svg ${base}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10Z" stroke="currentColor" stroke-width="2"/><path d="M7 10.5c3.6-1 6.9-.7 10 .9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M7.5 13.5c3-0.7 5.8-0.4 8.4 0.9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 16.2c2.2-0.4 4.2-0.1 6 0.7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
    }
    if(type === "youtube"){
      return `<svg ${base}><path d="M21 12s0-3.2-.4-4.6c-.2-.8-.9-1.5-1.7-1.7C17.5 5.3 12 5.3 12 5.3s-5.5 0-6.9.4c-.8.2-1.5.9-1.7 1.7C3 8.8 3 12 3 12s0 3.2.4 4.6c.2.8.9 1.5 1.7 1.7 1.4.4 6.9.4 6.9.4s5.5 0 6.9-.4c.8-.2 1.5-.9 1.7-1.7.4-1.4.4-4.6.4-4.6Z" stroke="currentColor" stroke-width="2"/><path d="M10.5 9.5v5l5-2.5-5-2.5Z" fill="currentColor"/></svg>`;
    }
    if(type === "vimeo"){
      return `<svg ${base}><path d="M21 8c-1.2 6-6.1 12-9.1 12-1.8 0-2.5-1.6-3.2-4.2-.6-2.1-1.1-4.2-2.1-4.2-.5 0-1.7.9-2.6 1.7L3 11.7C4.9 10 6.8 7.5 8.9 7.3c2.3-.2 3.7 1.3 4.2 3.8.6 2.8 1 4.8 2 4.8 1.6 0 3.8-3.2 4-5.1.2-1.3-.4-2-1.6-2-.6 0-1.2.1-1.7.4.9-3 2.8-4.5 5-4.3 1.7.1 2.5 1.2 2.2 3.1Z" fill="currentColor"/></svg>`;
    }
    if(type === "soundcloud"){
      return `<svg ${base}><path d="M7 14.5c-.6 0-1-.4-1-1v-2c0-.6.4-1 1-1s1 .4 1 1v2c0 .6-.4 1-1 1Z" fill="currentColor"/><path d="M10 14.5c-.6 0-1-.4-1-1V9.8c0-.6.4-1 1-1s1 .4 1 1v3.7c0 .6-.4 1-1 1Z" fill="currentColor"/><path d="M13 14.5c-.6 0-1-.4-1-1V8.2c0-.6.4-1 1-1s1 .4 1 1v5.3c0 .6-.4 1-1 1Z" fill="currentColor"/><path d="M16.5 14.5H15.5c-.6 0-1-.4-1-1V7.5c0-.6.4-1 1-1s1 .4 1 1v.1c.5-.4 1.1-.6 1.8-.6 1.8 0 3.2 1.4 3.2 3.2s-1.4 3.3-3.8 3.3Z" fill="currentColor"/></svg>`;
    }
    return `<svg ${base}><path d="M10 13a5 5 0 0 1 0-7l1.2-1.2a5 5 0 0 1 7 7L17 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M14 11a5 5 0 0 1 0 7L12.8 19.2a5 5 0 0 1-7-7L7 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
  }

  function byggLenkjerHtml(){
    const lenkjer = [
      { namn: "Spotify",    url: val("lenk-spotify"),    ikon: "spotify" },
      { namn: "YouTube",    url: val("lenk-youtube"),    ikon: "youtube" },
      { namn: "Vimeo",      url: val("lenk-vimeo"),      ikon: "vimeo" },
      { namn: "SoundCloud", url: val("lenk-soundcloud"), ikon: "soundcloud" },
      { namn: "SoundScore", url: val("lenk-soundscore"), ikon: "link" }
    ].filter(x => !erTom(x.url));

    if(!lenkjer.length) return "";

    const knappar = lenkjer.map(x =>
      `<a class="lenkeknapp" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">
        <span class="lenkje-ikon">${ikonSvg(x.ikon)}</span>
        <span class="lenkje-tekst">${esc(x.namn)}</span>
      </a>`
    ).join("\n      ");

    return `<section class="songlenkjer">
      ${knappar}
    </section>`;
  }

  function stripHtmlTilTekst(html){
    const tmp = document.createElement("div");
    tmp.innerHTML = html || "";
    return (tmp.textContent || "").replace(/\s+/g, " ").trim();
  }

  function byggOmVisaHtml(){
    const rå = (document.getElementById("meta-om-visa")?.value || "").trim();
    if (!rå) return "";

    const harTaggar = /<\/?[a-z][\s\S]*>/i.test(rå);

    let bodyHtml = "";
    if (harTaggar) {
      bodyHtml = rå;
    } else {
      const avsnitt = rå
        .split(/\n\s*\n/g)
        .map(p => p.trim())
        .filter(Boolean)
        .map(p => `<p>${esc(p).replace(/\n/g, "<br>")}</p>`)
        .join("\n      ");
      bodyHtml = avsnitt || `<p>${esc(rå)}</p>`;
    }

    const dataTekst = esc(stripHtmlTilTekst(bodyHtml));

    return `<section class="om-visa"
      id="om-visa"
      data-om-visa="${dataTekst}"
      aria-label="Om visa">
      <h2>Om visa</h2>
      ${bodyHtml}
    </section>`;
  }

  function byggSongboksHtml(){
    const tekst  = val("meta-tekst");
    const melodi = val("meta-melodi");
    const kjelde = val("meta-kjelde");

    const rader = [];
    if(!erTom(tekst))  rader.push({ k: "Tekst",  v: tekst });
    if(!erTom(melodi)) rader.push({ k: "Melodi", v: melodi });
    if(!erTom(kjelde)) rader.push({ k: "Kjelde", v: kjelde });

    if(!rader.length) return "";

    const divar = rader.map(r =>
      `<div><dt>${esc(r.k)}</dt><dd>${esc(r.v)}</dd></div>`
    ).join("\n        ");

    const dataAttr = !erTom(kjelde) ? ` id="kjelde" data-kjelde="${esc(kjelde)}"` : "";

    return `<section class="songboks"${dataAttr} aria-label="Info og kjelde">
      <dl class="songinfo">
        ${divar}
      </dl>
    </section>`;
  }

  function byggBilbokvadLenkHtml(){
    return document.getElementById("bilbokvad-ja")?.checked
      ? `<p class="muted" style="margin-top: 14px;">
      <a href="/bilbokvadi">← Tilbake til Bilbokvædi</a>
    </p>`
      : "";
  }

  function lagFullSide(tittel, versHtml, lenkjerHtml, omVisaHtml, songboksHtml, bilbokvadLenkHtml, versenummer){
    const songtekstClass = versenummer ? "songtekst nummer" : "songtekst";
    return `<!doctype html>
<html lang="nn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>${esc(tittel)}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,650&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../stilar/hovud.css" />
  <link rel="stylesheet" href="../../stilar/song.css" />

  <style>
    article.songtekst{ --songtekst-breidd: 30rem; }
  </style>
</head>

<body>
  <div id="topp-include"></div>

  <main class="omslag">
    <article class="${songtekstClass}">
      <h1>${esc(tittel)}</h1>

      ${versHtml}
    </article>

    ${lenkjerHtml ? "\n    " + lenkjerHtml + "\n" : ""}${omVisaHtml ? "\n    " + omVisaHtml + "\n" : ""}${songboksHtml ? "\n    " + songboksHtml + "\n" : ""}${bilbokvadLenkHtml ? "\n    " + bilbokvadLenkHtml + "\n" : ""}
  </main>

  <div id="kolofon-include"></div>

  <script src="../../skript/inkluder.js"></scr` + `ipt>
</body>
</html>`;
  }

  // Toolbar
  toolbar?.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-cmd]");
    if(!btn) return;
    e.preventDefault();

    if (!editor) return;

    const cmd = btn.dataset.cmd;
    const chain = editor.chain().focus();

    if(cmd === "bold") chain.toggleBold().run();
    else if(cmd === "italic") chain.toggleItalic().run();
    else if(cmd === "br") chain.setHardBreak().run();
    else if(cmd === "block-omkved") chain.updateAttributes("paragraph", { blockClass: "omkved" }).run();
    else if(cmd === "block-merknad") chain.updateAttributes("paragraph", { blockClass: "merknad" }).run();
    else if(cmd === "block-merknad-inline") chain.updateAttributes("paragraph", { blockClass: "merknad-inline" }).run();
    else if(cmd === "block-normal") chain.updateAttributes("paragraph", { blockClass: null }).run();
    else if(cmd === "clear") chain.clearNodes().unsetAllMarks().run();
  });

  // Bygg side
  document.getElementById("knapp-bygg")?.addEventListener("click", () => {
    if (!editor) {
      setStatus(statusH, "FEIL: Editor er ikkje lasta (TipTap-feil).");
      return;
    }

    const tittel = (val("side-tittel") || "Songtittel");

    const versHtml     = byggVers(editor.getJSON());
    const lenkjerHtml  = byggLenkjerHtml();
    const omVisaHtml   = byggOmVisaHtml();
    const songboksHtml = byggSongboksHtml();
    const bilbokvadLenkHtml = byggBilbokvadLenkHtml();
    const versenummer = document.getElementById("versenummer-ja")?.checked ?? false;

    out.value = lagFullSide(tittel, versHtml, lenkjerHtml, omVisaHtml, songboksHtml, bilbokvadLenkHtml, versenummer);
    setStatus(statusH, "Ferdig bygd – alt under vers er: lenker → Om visa → songboks.");
  });

  // Kopier
  document.getElementById("knapp-kopier")?.addEventListener("click", async () => {
    try{
      await navigator.clipboard.writeText(out.value || "");
      setStatus(statusH, "Kopiert.");
    }catch(e){
      out.focus(); out.select();
      setStatus(statusH, "Klarte ikkje auto-kopiere. Teksten er markert – trykk Ctrl/Cmd+C.");
    }
  });

  // Tøm
  document.getElementById("knapp-tom")?.addEventListener("click", () => {
    if (editor) editor.commands.setContent("<p></p>");
    setStatus(statusV, "Editor tømt.");
  });
</script>
</body>
</html>
